name: Update quotes

on:
  schedule:
    # Every 15 min, 13:00-21:00 UTC weekdays (covers US market hours in EDT and EST)
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-quotes.mjs
      - name: Commit if changed
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@users.noreply.github.com"
          git add quotes.json
          git diff --cached --quiet || (git commit -m "Update quotes" && git push)
